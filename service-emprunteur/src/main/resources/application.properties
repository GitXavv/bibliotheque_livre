spring.application.name=Service-emprunteur
server.port=8082

# Configuration de la base de donn�es
spring.datasource.url=jdbc:mysql://localhost:3306/bibliotheque_emprunteur?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# Personnaliser le chemin d'acc�s (optionnel)
springdoc.swagger-ui.path=/swagger-ui.html
# Trier les endpoints par m�thode HTTP (GET, POST, etc.)
springdoc.swagger-ui.operationsSorter=method